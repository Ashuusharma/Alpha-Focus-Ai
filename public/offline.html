<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alpha Focus Offline</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4efe6;
        color: #1f3d2b;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 460px;
        background: #ffffff;
        border: 1px solid #e2ddd3;
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 12px 32px rgba(31, 61, 43, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #5f5a53;
      }

      .hint {
        margin-top: 18px;
        font-size: 14px;
        color: #2f6f57;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>Alpha Focus saved the last app shell, but this screen needs a live connection to fetch your latest analysis, routine progress, and rewards.</p>
      <p class="hint">Reconnect to mobile data or Wi-Fi and reopen the app. Your local session and cached shell will be restored automatically.</p>
    </main>
  </body>
  </html>
